<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>L'Oréal | Smart Routine &amp; Product Advisor</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="page-wrapper">

      <!-- Header / Branding -->
      <header class="site-header">
        <!-- RTL toggle — switches the page layout to right-to-left mode -->
        <button id="rtlToggle" class="rtl-toggle" title="Toggle RTL layout" aria-label="Toggle right-to-left layout">
          <i class="fa-solid fa-right-left"></i>
          <span>RTL</span>
        </button>

        <img src="img/loreal-logo.png" alt="L'Oréal Logo" class="logo" />
        <h1 class="site-title">Smart Routine &amp; Product Advisor</h1>
        <p class="site-subtitle">Discover. Select. Build your perfect routine.</p>
      </header>

      <!-- Category Filter + Product Search -->
      <div class="search-section">
        <!-- Category dropdown -->
        <div class="select-wrapper">
          <i class="fa-solid fa-layer-group select-icon"></i>
          <select id="categoryFilter">
            <option value="" disabled selected>Choose a Category</option>
            <option value="cleanser">Cleansers</option>
            <option value="moisturizer">Moisturizers &amp; Treatments</option>
            <option value="skincare">Skincare &amp; Serums</option>
            <option value="haircare">Haircare</option>
            <option value="makeup">Makeup</option>
            <option value="hair color">Hair Color</option>
            <option value="hair styling">Hair Styling</option>
            <option value="men's grooming">Men's Grooming</option>
            <option value="suncare">Suncare</option>
            <option value="fragrance">Fragrance</option>
          </select>
        </div>

        <!-- Keyword search — filters products by name or brand as you type -->
        <div class="search-input-wrapper">
          <i class="fa-solid fa-magnifying-glass search-input-icon"></i>
          <input
            id="productSearch"
            type="search"
            placeholder="Search by name or keyword…"
            autocomplete="off"
            aria-label="Search products"
          />
        </div>
      </div>

      <!-- Products Grid -->
      <div id="productsContainer" class="products-grid"></div>

      <!-- Selected Products -->
      <div class="selected-products">
        <div class="selected-header">
          <h2>
            <i class="fa-solid fa-basket-shopping"></i>
            Selected Products
            <span id="selectedCount" class="selected-count">0</span>
          </h2>
          <button id="clearAll" class="clear-btn">
            <i class="fa-solid fa-trash-can"></i> Clear All
          </button>
        </div>
        <div id="selectedProductsList"></div>
        <button id="generateRoutine" class="generate-btn">
          <i class="fa-solid fa-wand-magic-sparkles"></i> Generate My Routine
        </button>
      </div>

      <!-- Chat Area -->
      <section class="chatbox">
        <div class="chatbox-header">
          <div class="advisor-avatar">
            <i class="fa-solid fa-face-smile-wink"></i>
          </div>
          <div class="advisor-info">
            <h2>L'Oréal Beauty Advisor</h2>
            <p class="advisor-status">
              <span class="status-dot"></span> Online
            </p>
          </div>
        </div>

        <div id="chatWindow" class="chat-window"></div>

        <form id="chatForm" class="chat-form">
          <label for="userInput" class="visually-hidden">Message</label>
          <input
            id="userInput"
            name="userInput"
            type="text"
            placeholder="Ask about your routine, skincare tips, ingredients…"
            autocomplete="off"
            required
          />

          <!-- Web Search toggle — when ON, responses include live web results -->
          <button
            type="button"
            id="webSearchBtn"
            class="web-search-btn"
            title="Web Search: OFF"
            aria-label="Toggle web search"
            aria-pressed="false"
          >
            <i class="fa-solid fa-globe"></i>
          </button>

          <button type="submit" id="sendBtn" aria-label="Send message">
            <i class="fa-solid fa-paper-plane"></i>
          </button>
        </form>
      </section>

      <!-- Footer -->
      <footer class="site-footer">
        <p>&copy; 2025 L'Oréal. All rights reserved.</p>
        <nav>
          <a href="#">Privacy Policy</a>
          <a href="#">Terms of Use</a>
          <a href="#">Contact</a>
        </nav>
      </footer>

    </div>

    <script src="script.js"></script>
  </body>
</html>
